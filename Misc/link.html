<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link</title>
  <style>
    body {
      margin: 0;
      padding: 1.5rem 1rem 2rem;
      font-family: "Times New Roman", Times, serif;
      line-height: 1.5;
      text-align: center;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    a {
      color: #163f89;
      text-decoration: none;
      word-break: break-all;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      margin: 1rem auto 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a href="https://tinyurl.com/TorzaSMS">https://tinyurl.com/TorzaSMS</a>
    <img src="TorzaSMS-1200.png" alt="Torza SMS">
  </main>
</body>
</html>
